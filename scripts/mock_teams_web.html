<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Microsoft Teams</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f2f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #242424;
            width: 80%;
            height: 80%;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }
        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .prejoin-controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        #join-btn {
            background-color: #5b5fc7;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        #join-btn:hover {
            background-color: #4e52b1;
        }
        #call-ui {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 20px;
            background-color: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
        }
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            outline: none;
        }
        #mute-btn {
            background-color: white;
            color: black;
        }
        #mute-btn.muted {
            background-color: #d83b01;
            color: white;
        }
        .status-label {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Lobby Screen -->
        <div id="lobby">
            <h1>Meeting Lobby</h1>
            <p>Ready to join?</p>
            <div class="prejoin-controls">
                <button id="prejoin-mic-btn" class="control-btn" onclick="togglePrejoinMute()" aria-label="Mute microphone" data-tid="prejoin-mic-icon">🎙️</button>
                <button id="prejoin-speaker-btn" class="control-btn" aria-label="Mute speaker" data-tid="prejoin-speaker-icon">🔊</button>
            </div>
            <div id="prejoin-name-container">
                <input type="text" id="prejoin-display-name-input" placeholder="Enter name" data-tid="prejoin-display-name-input">
            </div>
            <button id="join-btn" onclick="joinCall()" data-tid="prejoin-join-button">Join now</button>
        </div>

        <!-- Call Screen -->
        <div id="call-ui">
            <div id="status" class="status-label">Mic Active</div>
            <div class="controls">
                <button id="mute-btn" class="control-btn" onclick="toggleMute()">🎙️</button>
                <button class="control-btn" style="background-color: #d83b01; color: white;">📞</button>
            </div>
        </div>
    </div>

    <script>
        let isMuted = false;
        let isPrejoinMuted = false;
        let inCall = false;
        const lobby = document.getElementById('lobby');
        const callUI = document.getElementById('call-ui');
        const muteBtn = document.getElementById('mute-btn');
        const statusLabel = document.getElementById('status');

        function joinCall() {
            inCall = true;
            lobby.style.display = 'none';
            callUI.style.display = 'flex';
            console.log('Teams Status: JOINED CALL');
        }

        function togglePrejoinMute() {
            isPrejoinMuted = !isPrejoinMuted;
            const btn = document.getElementById('prejoin-mic-btn');
            if (isPrejoinMuted) {
                btn.classList.add('muted');
                btn.setAttribute('aria-label', 'Unmute microphone');
                console.log('Teams Status: PREJOIN MUTED');
            } else {
                btn.classList.remove('muted');
                btn.setAttribute('aria-label', 'Mute microphone');
                console.log('Teams Status: PREJOIN UNMUTED');
            }
        }

        function toggleMute() {
            if (!inCall) return;
            isMuted = !isMuted;
            if (isMuted) {
                muteBtn.classList.add('muted');
                statusLabel.innerText = 'Muted';
                console.log('Teams Status: MUTED');
            } else {
                muteBtn.classList.remove('muted');
                statusLabel.innerText = 'Mic Active';
                console.log('Teams Status: UNMUTED');
            }
        }

        window.addEventListener('keydown', (event) => {
            console.log('Key pressed in web: ' + event.key + ' Code: ' + event.code);
            if (!inCall && !lobby.contains(document.activeElement) && document.getElementById('prejoin-display-name-input').value === "") {
                 // In real teams, 'm' might not work if focus is on input, but let's allow it for testing if name is filled
            }
            // 'AudioVolumeMute' is a common keysym for the mute button
            const isMuteKey = event.key.toLowerCase() === 'm' || event.key === 'AudioVolumeMute' || event.code === 'AudioVolumeMute' || event.keyCode === 173 || event.keyCode === 181;
            const isTeamsShortcut = event.ctrlKey && event.shiftKey && event.key.toLowerCase() === 'm';

            if (isMuteKey || isTeamsShortcut) {
                if (isTeamsShortcut) {
                    console.log("Detected Telephony Mute shortcut (Ctrl+Shift+M)");
                }
                if (inCall) {
                    toggleMute();
                } else {
                    togglePrejoinMute();
                }
            }
        });
    </script>
</body>
</html>
