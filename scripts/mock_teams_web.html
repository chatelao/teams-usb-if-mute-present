<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Microsoft Teams</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f2f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #242424;
            width: 80%;
            height: 80%;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }
        #lobby {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        #join-btn {
            background-color: #5b5fc7;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        #join-btn:hover {
            background-color: #4e52b1;
        }
        #call-ui {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 20px;
            background-color: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
        }
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            outline: none;
        }
        #mute-btn {
            background-color: white;
            color: black;
        }
        #mute-btn.muted {
            background-color: #d83b01;
            color: white;
        }
        /* Style for the guest name input */
        #prejoin-display-name-input {
            padding: 8px;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        .status-label {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Lobby Screen -->
        <div id="lobby">
            <h1>Meeting Lobby</h1>
            <p>Ready to join?</p>
            <input type="text" id="prejoin-display-name-input" data-tid="prejoin-display-name-input" placeholder="Enter your name">
            <button id="join-btn" data-tid="prejoin-join-button" onclick="joinCall()">Join now</button>
        </div>

        <!-- Call Screen -->
        <div id="call-ui">
            <div id="status" class="status-label">Mic Active</div>
            <div class="controls">
                <button id="mute-btn" data-tid="microphone-button" aria-label="Mute" class="control-btn" onclick="toggleMute()">🎙️</button>
                <button class="control-btn" style="background-color: #d83b01; color: white;">📞</button>
            </div>
        </div>
    </div>

    <script>
        let isMuted = false;
        let inCall = false;
        const lobby = document.getElementById('lobby');
        const callUI = document.getElementById('call-ui');
        const muteBtn = document.getElementById('mute-btn');
        const statusLabel = document.getElementById('status');

        function joinCall() {
            inCall = true;
            lobby.style.display = 'none';
            callUI.style.display = 'flex';
            console.log('Teams Status: JOINED CALL');
        }

        function toggleMute() {
            if (!inCall) return;
            isMuted = !isMuted;
            if (isMuted) {
                muteBtn.classList.add('muted');
                muteBtn.setAttribute('aria-label', 'Unmute');
                statusLabel.innerText = 'Muted';
                console.log('Teams Status: MUTED');
            } else {
                muteBtn.classList.remove('muted');
                muteBtn.setAttribute('aria-label', 'Mute');
                statusLabel.innerText = 'Mic Active';
                console.log('Teams Status: UNMUTED');
            }
        }

        window.addEventListener('keydown', (event) => {
            if (!inCall) return;
            console.log('Key pressed in web: ' + event.key + ' Code: ' + event.code);
            // 'm' is the shortcut for mute in Teams
            // 'AudioVolumeMute' is a common keysym for the mute button
            if (event.key.toLowerCase() === 'm' || event.key === 'AudioVolumeMute' || event.code === 'AudioVolumeMute' || event.keyCode === 173 || event.keyCode === 181) {
                toggleMute();
            }
        });
    </script>
</body>
</html>
